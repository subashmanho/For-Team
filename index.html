<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkillBridge - Learn Together, Teach Together</title>
  <link rel="stylesheet" href="../html/style.css" />
</head>
<body>
 
  <header class="top-section">
    <div class="logo">
      <span class="logo-icon">🔗</span>
      <span class="logo-text">Skill<span class="logo-highlight">Bridge</span></span>
    </div>
 
    <h1 class="main-title">Learn Together, Teach Together</h1>
    <p class="main-subtitle">Exchange skills with people around you.</p>
  </header>
 
  <main class="auth-container">
    <div class="auth-card">
 
      <div class="tabs">
        <button class="tab-btn active" id="loginTabBtn" onclick="switchTab('login')">
          Login
        </button>
        <button class="tab-btn" id="signupTabBtn" onclick="switchTab('signup')">
          Sign Up
        </button>
      </div>
 
      <form class="auth-form active" id="loginForm">
        <div class="input-group">
          <label for="loginEmail">Email</label>
          <input type="email" id="loginEmail" placeholder="you@example.com" required />
        </div>
 
        <div class="input-group">
          <label for="loginPassword">Password</label>
          <input type="password" id="loginPassword" placeholder="Enter your password" required />
        </div>
 
        <div class="form-row">
          <label class="checkbox-label">
            <input type="checkbox" id="rememberMe" />
            Remember Me
          </label>
          <a href="#" class="forgot-link">Forgot Password?</a>
        </div>
 
        <button type="submit" class="primary-btn">Login</button>
 
        <div class="divider">
          <span>OR</span>
        </div>
 
        <button type="button" class="google-btn">
          <span class="google-icon">G</span>
          Continue with Google
        </button>
 
        <p class="switch-text">
          Don't have an account?
          <a href="#" onclick="switchTab('signup')">Sign Up</a>
        </p>
      </form>
 
      <form class="auth-form" id="signupForm">
        <div class="input-group">
          <label for="signupName">Full Name</label>
          <input type="text" id="signupName" placeholder="Your full name" required />
        </div>
 
        <div class="input-group">
          <label for="signupEmail">Email</label>
          <input type="email" id="signupEmail" placeholder="you@example.com" required />
        </div>
 
        <div class="input-group">
          <label for="signupPassword">Password</label>
          <input type="password" id="signupPassword" placeholder="Create a password" required />
        </div>
 
        <div class="input-group">
          <label for="signupConfirmPassword">Confirm Password</label>
          <input type="password" id="signupConfirmPassword" placeholder="Re-enter your password" required />
        </div>
 
        <p class="error-text" id="signupError"></p>
 
        <button type="submit" class="primary-btn">Create Account</button>
 
        <p class="switch-text">
          Already have an account?
          <a href="profile.html" onclick="switchTab('login')">Login</a>
        </p>
      </form>
 
    </div>
  </main>
 
  <script src="js/app.js"></script>
</body>
</html>
